<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Property View - Laptop</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --p-primary: #C47756;
            --p-primary-dark: #a85f40;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #0a0a0a;
            min-height: 100vh;
            margin: 0;
            padding: 0;
        }

        /* Main Container - Laptop Size */
        .laptop-container {
            width: 100vw;
            height: 100vh;
            position: relative;
            overflow: hidden;
            box-shadow: 0 25px 80px rgba(0, 0, 0, 0.5);
        }

        /* Background Image - Full Screen */
        .p-bg {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: url('pexels-alex-qian-1180283-2343465.jpg') center/cover no-repeat;
            z-index: 0;
        }

        .p-bg::after {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(
                to bottom,
                rgba(0, 0, 0, 0.4) 0%,
                rgba(0, 0, 0, 0.2) 30%,
                rgba(0, 0, 0, 0.2) 60%,
                rgba(0, 0, 0, 0.7) 100%
            );
        }

        /* Nav */
        .p-nav {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 22px 40px;
            z-index: 20;
            background: linear-gradient(to bottom, rgba(0,0,0,0.5), transparent);
        }

        .p-nav-logo {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .p-nav-icon {
            font-size: 1.4rem;
            color: white;
        }

        .p-nav-brand {
            font-size: 1rem;
            font-weight: 600;
            color: white;
            letter-spacing: 0.02em;
        }

        .p-nav-links {
            display: flex;
            align-items: center;
            gap: 24px;
        }

        .p-nav-link {
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.9);
            text-decoration: none;
            font-weight: 400;
            transition: opacity 0.3s;
        }

        .p-nav-link:hover {
            opacity: 0.8;
        }

        .p-nav-cta {
            padding: 8px 18px;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(8px);
            border-radius: 4px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            font-size: 0.8rem;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.3s;
        }
        
        .p-nav-cta:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        /* Main Content */
        .hero-content {
            width: 100%;
            max-width: 500px;
            z-index: 10;
            padding: clamp(19px, 4vw, 40px) clamp(13px, 2.4vw, 26px);
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(4px);
            border-radius: 0;
            position: absolute;
            bottom: 60px;
            left: 40px;
        }

        .p-title {
            font-family: 'Inter', sans-serif;
            font-size: clamp(1.1rem, 2.8vw, 1.6rem);
            font-weight: 400;
            letter-spacing: 0.02em;
            text-transform: uppercase;
            color: white;
            margin-bottom: 10px;
            line-height: 1.1;
            text-shadow: 0 2px 20px rgba(0,0,0,0.3);
        }

        .p-description {
            font-size: clamp(0.72rem, 1.6vw, 0.88rem);
            color: rgba(255, 255, 255, 0.9);
            line-height: 1.6;
            margin-bottom: 20px;
            font-weight: 300;
        }

        .p-price-row {
            display: flex;
            align-items: baseline;
            gap: 12px;
            margin-bottom: 16px;
        }

        .p-price {
            font-size: 1.2rem;
            font-weight: 600;
            color: white;
        }

        .p-price span {
            font-size: 0.6rem;
            font-weight: 400;
            color: rgba(255, 255, 255, 0.7);
        }

        /* Details Cards */
        .p-details {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }

        .p-detail {
            display: flex;
            align-items: center;
            gap: 3px;
            font-size: 0.56rem;
            color: rgba(255, 255, 255, 0.95);
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            padding: 5px 8px;
            border-radius: 3px;
            border: 1px solid rgba(255, 255, 255, 0.15);
        }

        .p-detail svg {
            width: 11px;
            height: 11px;
            stroke: white;
            fill: none;
        }

        .p-detail span {
            font-weight: 500;
        }

        /* Bottom Booking Bar */
        .p-bottom {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 19px 40px;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            z-index: 15;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .p-rating {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .p-rating-stars {
            display: flex;
            gap: 2px;
        }

        .p-rating-stars svg {
            width: 14px;
            height: 14px;
            fill: #FFD700;
            stroke: #FFD700;
        }

        .p-rating-text {
            font-size: 0.8rem;
            color: white;
            font-weight: 500;
        }

        .p-reviews {
            font-size: 0.76rem;
            color: rgba(255, 255, 255, 0.7);
        }

        .p-book-btn {
            padding: 13px 32px;
            background: var(--p-primary);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 0.88rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .p-book-btn:hover {
            background: var(--p-primary-dark);
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(196, 119, 86, 0.4);
        }

        /* Amenities Quick Icons */
        .p-amenities {
            position: absolute;
            right: 40px;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            gap: 13px;
            z-index: 12;
        }

        .p-amenity {
            width: 40px;
            height: 40px;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .p-amenity svg {
            width: 19px;
            height: 19px;
            stroke: white;
            fill: none;
        }
    </style>
</head>
<body>
    <!-- Main Container -->
    <div class="laptop-container">
        <!-- Background -->
        <div class="p-bg"></div>

        <!-- Nav -->
        <nav class="p-nav">
            <div class="p-nav-logo">
                <span class="p-nav-icon">◈</span>
                <span class="p-nav-brand">LuxSpace.Pro</span>
            </div>
            <div class="p-nav-links">
                <a href="#" class="p-nav-link">Sign in</a>
                <button class="p-nav-cta">Sign up</button>
            </div>
        </nav>

        <!-- Main Content -->
        <div class="hero-content">
            <h1 class="p-title">Your Luxury City Retreat</h1>
            <p class="p-description">Elegant, ultra-comfy New York city apartment with plush interiors, premium amenities, and sweeping skyline views. Perfect for your next city vacation.</p>

            <div class="p-price-row">
                <div class="p-price">$250 <span>/ night</span></div>
            </div>

            <div class="p-details">
                <div class="p-detail">
                    <svg viewBox="0 0 24 24" stroke-width="2">
                        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
                    </svg>
                    <span>3 Beds</span>
                </div>
                <div class="p-detail">
                    <svg viewBox="0 0 24 24" stroke-width="2">
                        <path d="M4 12h16M4 12a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v4a2 2 0 0 1-2 2M4 12V8a2 2 0 0 1 2-2h2"/>
                    </svg>
                    <span>2 Baths</span>
                </div>
                <div class="p-detail">
                    <svg viewBox="0 0 24 24" stroke-width="2">
                        <circle cx="12" cy="12" r="10"/>
                        <path d="M12 6v6l4 2"/>
                    </svg>
                    <span>Instant Book</span>
                </div>
                <div class="p-detail">
                    <svg viewBox="0 0 24 24" stroke-width="2">
                        <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
                        <circle cx="9" cy="7" r="4"/>
                    </svg>
                    <span>6 Guests</span>
                </div>
                <div class="p-detail">
                    <svg viewBox="0 0 24 24" stroke-width="2">
                        <path d="M5 12.55a11 11 0 0 1 14.08 0M1.42 9a16 16 0 0 1 21.16 0"/>
                        <path d="M8.53 16.11a6 6 0 0 1 6.95 0M12 20h.01"/>
                    </svg>
                    <span>Fast WiFi</span>
                </div>
                <div class="p-detail">
                    <svg viewBox="0 0 24 24" stroke-width="2">
                        <rect x="3" y="4" width="18" height="18" rx="2"/>
                        <path d="M16 2v4M8 2v4M3 10h18"/>
                    </svg>
                    <span>Free Cancellation</span>
                </div>
            </div>
        </div>

        <!-- Right Side Amenities -->
        <div class="p-amenities">
            <div class="p-amenity" title="WiFi">
                <svg viewBox="0 0 24 24" stroke-width="2">
                    <path d="M5 12.55a11 11 0 0 1 14.08 0M1.42 9a16 16 0 0 1 21.16 0"/>
                </svg>
            </div>
            <div class="p-amenity" title="Kitchen">
                <svg viewBox="0 0 24 24" stroke-width="2">
                    <path d="M3 2v7c0 1.1.9 2 2 2h4a2 2 0 0 0 2-2V2M7 2v20M21 15V2v0a5 5 0 0 0-5 5v6c0 1.1.9 2 2 2h3Zm0 0v7"/>
                </svg>
            </div>
            <div class="p-amenity" title="Parking">
                <svg viewBox="0 0 24 24" stroke-width="2">
                    <rect x="3" y="11" width="18" height="11" rx="2"/>
                    <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                </svg>
            </div>
            <div class="p-amenity" title="Pool">
                <svg viewBox="0 0 24 24" stroke-width="2">
                    <path d="M2 12h20M2 16c2-2 4-2 6 0s4 2 6 0M2 20c2-2 4-2 6 0s4 2 6 0"/>
                </svg>
            </div>
        </div>

        <!-- Bottom Bar -->
        <div class="p-bottom">
            <div class="p-rating">
                <div class="p-rating-stars">
                    <svg viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
                    <svg viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
                    <svg viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
                    <svg viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
                    <svg viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
                </div>
                <span class="p-rating-text">4.97</span>
                <span class="p-reviews">(128 reviews)</span>
            </div>

            <button class="p-book-btn">Book Now</button>
        </div>
    </div>
</body>
</html>
